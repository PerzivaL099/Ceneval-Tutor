services:
  # Servicio de Base de Datos
  db:
    image: postgres:15-alpine
    container_name: ceneval_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - ceneval_net

  # Servicio de API (Backend)
  api:
    build: ./backend
    container_name: ceneval_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      # Monta data_science para que el contenedor acceda al modelo y al código NLP
      - ./data_science:/data_science
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - ceneval_net

volumes:
  postgres_data:

networks:
  ceneval_net: